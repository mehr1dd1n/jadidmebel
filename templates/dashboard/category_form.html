{% extends 'dashboard/base.html' %}
{% block page_heading %}{{ action }}: kategoriya{% endblock %}
{% block content %}
<div class="card">
    <form method="POST" class="form-grid">
        {% csrf_token %}
        <div class="form-group"><label>Nomi (O'zbek) *</label><input type="text" name="name_uz" value="{{ category.name_uz|default:'' }}" required></div>
        <div class="form-group"><label>Nomi (Rus)</label><input type="text" name="name_ru" value="{{ category.name_ru|default:'' }}"></div>
        <div class="form-group"><label>Nomi (Ingliz)</label><input type="text" name="name_en" value="{{ category.name_en|default:'' }}"></div>
        <div class="form-group">
            <label>Slug *</label>
            <input type="text" name="slug" value="{{ category.slug|default:'' }}" required placeholder="stol, stul...">
        </div>
        <div class="form-group">
            <label>Emoji</label>
            <input type="text" name="icon" value="{{ category.icon|default:'🪑' }}" maxlength="10">
        </div>
        <div class="form-group">
            <label>Tartib</label>
            <input type="number" name="order" value="{{ category.order|default:0 }}" min="0">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-gold">Saqlash</button>
            <a href="{% url 'dashboard_category_list' %}" class="btn btn-outline">Bekor</a>
        </div>
    </form>
</div>
{% endblock %}
