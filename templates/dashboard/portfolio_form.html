{% extends 'dashboard/base.html' %}
{% block page_heading %}{{ action }}: portfolio{% endblock %}
{% block content %}
<div class="card">
    <form method="POST" enctype="multipart/form-data" class="form-grid">
        {% csrf_token %}
        <div class="form-group"><label>Sarlavha (O'zbek) *</label><input type="text" name="title_uz" value="{{ work.title_uz|default:'' }}" required></div>
        <div class="form-group"><label>Sarlavha (Rus)</label><input type="text" name="title_ru" value="{{ work.title_ru|default:'' }}"></div>
        <div class="form-group"><label>Sarlavha (Ingliz)</label><input type="text" name="title_en" value="{{ work.title_en|default:'' }}"></div>
        <div class="form-group"><label>Tavsif (O'zbek)</label><textarea name="description_uz" rows="3">{{ work.description_uz|default:'' }}</textarea></div>
        <div class="form-group"><label>Tavsif (Rus)</label><textarea name="description_ru" rows="3">{{ work.description_ru|default:'' }}</textarea></div>
        <div class="form-group"><label>Tavsif (Ingliz)</label><textarea name="description_en" rows="3">{{ work.description_en|default:'' }}</textarea></div>
        <div class="form-group">
            <label>Asosiy rasm {% if not work %}*{% endif %}</label>
            <input type="file" name="image" accept="image/*" {% if not work %}required{% endif %}>
            {% if work.image %}<img src="{{ work.image.url }}" class="thumb" style="width:120px;margin-top:0.5rem;" alt="">{% endif %}
        </div>
        <div class="form-group">
            <label>Oldin (ixtiyoriy)</label>
            <input type="file" name="before_image" accept="image/*">
        </div>
        <div class="form-check">
            <input type="checkbox" name="is_active" id="active" {% if work.is_active or not work %}checked{% endif %}>
            <label for="active">Saytda ko'rsatish</label>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-gold">Saqlash</button>
            <a href="{% url 'dashboard_portfolio_list' %}" class="btn btn-outline">Bekor</a>
        </div>
    </form>
</div>
{% endblock %}
