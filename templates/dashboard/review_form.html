{% extends 'dashboard/base.html' %}
{% block page_heading %}{{ action }}: fikr{% endblock %}
{% block content %}
<div class="card">
    <form method="POST" enctype="multipart/form-data" class="form-grid">
        {% csrf_token %}
        <div class="form-group">
            <label>Ism *</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Fikr *</label>
            <textarea name="text" rows="4" required></textarea>
        </div>
        <div class="form-group">
            <label>Baho (1-5)</label>
            <select name="rating">
                <option value="5" selected>5 ⭐</option>
                <option value="4">4</option>
                <option value="3">3</option>
            </select>
        </div>
        <div class="form-group">
            <label>Rasm (ixtiyoriy)</label>
            <input type="file" name="avatar" accept="image/*">
        </div>
        <div class="form-check">
            <input type="checkbox" name="is_active" id="active" checked>
            <label for="active">Saytda ko'rsatish</label>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-gold">Saqlash</button>
            <a href="{% url 'dashboard_review_list' %}" class="btn btn-outline">Bekor</a>
        </div>
    </form>
</div>
{% endblock %}
