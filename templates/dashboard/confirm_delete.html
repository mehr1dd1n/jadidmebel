{% extends 'dashboard/base.html' %}
{% block page_heading %}O'chirish{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;text-align:center;">
    <p style="font-size:3rem;margin-bottom:1rem;">🗑️</p>
    <h2 style="margin-bottom:0.75rem;">{{ type }}ni o'chirish</h2>
    <p style="color:var(--gray);margin-bottom:2rem;">
        <strong style="color:var(--cream);">"{{ obj }}"</strong> butunlay o'chiriladi. Bu amalni qaytarib bo'lmaydi.
    </p>
    <form method="POST" style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Ha, o'chirish</button>
        <a href="javascript:history.back()" class="btn btn-outline">Bekor qilish</a>
    </form>
</div>
{% endblock %}
