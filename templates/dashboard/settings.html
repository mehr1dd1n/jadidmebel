{% extends 'dashboard/base.html' %}
{% block page_heading %}Sayt sozlamalari{% endblock %}
{% block content %}
<div class="card">
    <form method="POST" class="form-grid" style="max-width:720px;">
        {% csrf_token %}
        <div class="form-group"><label>Telefon</label><input type="text" name="phone" value="{{ settings.phone }}"></div>
        <div class="form-group"><label>Telegram</label><input type="url" name="telegram" value="{{ settings.telegram }}"></div>
        <div class="form-group"><label>WhatsApp</label><input type="text" name="whatsapp" value="{{ settings.whatsapp }}"></div>
        <div class="form-group"><label>Instagram</label><input type="url" name="instagram" value="{{ settings.instagram }}"></div>
        <div class="form-group"><label>Manzil (O'zbek)</label><input type="text" name="address_uz" value="{{ settings.address_uz }}"></div>
        <div class="form-group"><label>Manzil (Rus)</label><input type="text" name="address_ru" value="{{ settings.address_ru }}"></div>
        <div class="form-group"><label>Manzil (Ingliz)</label><input type="text" name="address_en" value="{{ settings.address_en }}"></div>
        <div class="form-group"><label>Biz haqimizda (O'zbek)</label><textarea name="about_text_uz" rows="4">{{ settings.about_text_uz }}</textarea></div>
        <div class="form-group"><label>Biz haqimizda (Rus)</label><textarea name="about_text_ru" rows="4">{{ settings.about_text_ru }}</textarea></div>
        <div class="form-group"><label>Biz haqimizda (Ingliz)</label><textarea name="about_text_en" rows="4">{{ settings.about_text_en }}</textarea></div>
        <div class="form-group"><label>Google Maps iframe</label><textarea name="map_embed" rows="4">{{ settings.map_embed }}</textarea></div>
        <div class="form-actions"><button type="submit" class="btn btn-gold">💾 Saqlash</button></div>
    </form>
</div>
{% endblock %}
